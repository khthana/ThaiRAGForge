# Adds 3 new embedders to the chunker_compare_full matrix (Qwen3-Embedding-4B,
# jina-embeddings-v5-text-small-retrieval, and a Model2Vec static distillation
# of jina-embeddings-v3 for Thai). Same output_dir as chunker_compare_full.yaml
# -- combo ids are content-hashed on (loader, chunker, embedder), so this just
# fills in 12 new combos (4 chunkers x 3 embedders) alongside the original 12
# without touching them, same pattern as chunker_compare_full_resume.yaml /
# chunker_compare_full_semantic_rebuild.yaml.
# Run with:
#   PYTHONPATH=src python -m rag_lab.cli run --config config/experiments/chunker_compare_full_new_embedders.yaml
experiment_name: chunker_compare_full

corpus:
  input_dir: academic_resolutions
  subset: full

output_dir: data/index/chunker_compare_full

loaders:
  - type: plain

chunkers:
  - type: fixed_size
    params: { chunk_size: 512, chunk_overlap: 50 }
  - type: recursive
    params: { chunk_size: 512, chunk_overlap: 50 }
  - type: sentence
    params: { chunk_size: 512 }
  - type: semantic
    params: { breakpoint_threshold: 0.5 }

embedders:
  - type: qwen3
    params: { model_name: "Qwen/Qwen3-Embedding-4B" }
  - type: jina_v5
    params: { model_name: "jinaai/jina-embeddings-v5-text-small-retrieval" }
  - type: local
    params: { model_name: "Thaweewat/jina-embedding-v3-m2v-1024" }

run_mode: cartesian
seed: 42
