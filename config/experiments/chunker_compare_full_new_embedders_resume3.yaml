# Third resume of chunker_compare_full_new_embedders.yaml: resume2 got killed
# after finishing sentence+jina_v5 and sentence+m2v (2/4), partway into
# loading weights for semantic+jina_v5. Covers the last 2 non-qwen3 combos:
# semantic x jina_v5/m2v. The 3 qwen3 combos
# (chunker_compare_full_new_embedders_resume_qwen3.yaml) still come after.
# Run with:
#   PYTHONPATH=src python -m rag_lab.cli run --config config/experiments/chunker_compare_full_new_embedders_resume3.yaml
experiment_name: chunker_compare_full

corpus:
  input_dir: academic_resolutions
  subset: full

output_dir: data/index/chunker_compare_full

loaders:
  - type: plain

chunkers:
  - type: semantic
    params: { breakpoint_threshold: 0.5 }

embedders:
  - type: jina_v5
    params: { model_name: "jinaai/jina-embeddings-v5-text-small-retrieval" }
  - type: local
    params: { model_name: "Thaweewat/jina-embedding-v3-m2v-1024" }

run_mode: cartesian
seed: 42
